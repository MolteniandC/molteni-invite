<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molteni&C 新品發表會誠摯邀請您</title>
    <meta property="og:title" content="Molteni&C 新品發表會誠摯邀請您">
    <meta property="og:description" content="探索義大利頂級家具設計美學，誠摯邀請您的蒞臨。">
    <meta property="og:image" content="https://drive.google.com/thumbnail?id=1lMKH8uIRg_9PfNW7S-MjyI7lGBXlAxZG&sz=w1000">
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: #1a1a1a; touch-action: none; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; 
        }

        .tilt-wrapper { 
            width: 90vw; max-width: 350px; aspect-ratio: 1 / 1.5; perspective: 1500px;
        }

        .card-flipper { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden; 
            border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box;
            transform-style: preserve-3d;
        }

        .card-front { 
            background-image: url('https://drive.google.com/thumbnail?id=1lMKH8uIRg_9PfNW7S-MjyI7lGBXlAxZG&sz=w1000'); 
            background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; justify-content: center;
            transform: rotateY(0deg) translateZ(1px);
            z-index: 2;
        }

        /* 改良版：金屬流光層 (預設顯示，由 JS 控制位置) */
        .metal-sheen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 60%, rgba(255,255,255,0) 100%);
            background-size: 300% 300%;
            background-position: 50% 50%;
            mix-blend-mode: overlay; pointer-events: none;
            opacity: 0.8; /* 始終保持一點點光澤感 */
            z-index: 1;
        }

        .flip-hint { 
            margin-bottom: 25px; padding: 8px 20px; background: #3a1b1b; color: #ffffff; 
            font-size: 14px; border-radius: 20px; pointer-events: none;
            transform: translateZ(15px); /* 確保提示框浮出，不被殘影影響 */
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }

        .card-back { 
            background-color: #f2f0eb; 
            transform: rotateY(180deg) translateZ(1px);
            z-index: 1;
        }

        .back-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; box-sizing: border-box; text-align: center;
            transform: translateZ(10px);
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }

        .date-row { color: #666; font-size: 16px; letter-spacing: 1px; margin-bottom: 5px; font-weight: 500; }
        h2 { color: #3a1b1b; margin-top: 5px; margin-bottom: 12px; font-weight: 600; font-size: 22px; }
        p { color: #000000; margin: 6px 0; font-size: 16px; font-weight: 500; }

        .map-btn { 
            margin-top: 30px; padding: 12px 40px; background-color: #000000; color: #ffffff; 
            text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s;
            position: relative; z-index: 20; transform: translateZ(15px);
        }

        #motion-btn { margin-top: 30px; background: none; color: #444; border: 1px solid #333; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="tiltEl" class="tilt-wrapper" data-tilt data-tilt-gyroscope="true" data-tilt-max="15">
        <div class="card-flipper" id="myCard" onclick="handleCardClick(event)">
            <div class="card-front">
                <div class="metal-sheen" id="frontSheen"></div>
                <div class="flip-hint">點擊查看詳情</div>
            </div>
            <div class="card-back">
                <div class="metal-sheen" id="backSheen"></div>
                <div class="back-content">
                    <div class="date-row">4/9、4/10</div>
                    <h2>誠摯邀請</h2>
                    <p>Molteni&C 新品發表會</p>
                    <p style="font-size: 14px; color: #666; margin-top: 10px;">探索義大利經典設計</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=Molteni%26C+Taichung" target="_blank" class="map-btn" onclick="event.stopPropagation();">📍 開啟地圖導航</a>
                    <p style="font-size: 11px; color: #999; margin-top: 25px;">(點擊卡片再次翻轉)</p>
                </div>
            </div>
        </div>
    </div>

    <button id="motion-btn" onclick="requestPermission()">開啟動態感應 (iOS)</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        let permissionRequested = false;
        let currentRotation = 0;
        const frontSheen = document.getElementById('frontSheen');
        const backSheen = document.getElementById('backSheen');
        const tiltEl = document.getElementById('tiltEl');

        // 監聽陀螺儀/傾斜變化，即時改變光影位置
        tiltEl.addEventListener("tiltChange", (event) => {
            const x = event.detail.tiltX; // 範圍約 -15 到 15
            const y = event.detail.tiltY;
            
            // 將角度映射為百分比 (0% - 100%)
            const posX = ((x + 15) / 30) * 100;
            const posY = ((y + 15) / 30) * 100;
            
            // 同時更新正反兩面的光影位置
            frontSheen.style.backgroundPosition = `${posX}% ${posY}%`;
            backSheen.style.backgroundPosition = `${posX}% ${posY}%`;
        });

        function handleCardClick(event) {
            const card = document.getElementById('myCard');
            const rect = card.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            
            if (clickX < rect.width / 2) {
                currentRotation -= 180; 
            } else {
                currentRotation += 180; 
            }

            card.style.transform = `rotateY(${currentRotation}deg)`;

            // 請求 iOS 權限
            if (!permissionRequested && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { if (res == 'granted') permissionRequested = true; });
            }
        }

        function requestPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { if (res == 'granted') location.reload(); });
            }
        }
    </script>
</body>
</html>
