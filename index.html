<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molteni&C 新品發表會誠摯邀請您</title>
    <meta property="og:title" content="Molteni&C 新品發表會誠摯邀請您">
    <meta property="og:description" content="探索義大利頂級家具設計美學，誠摯邀請您的蒞臨。">
    <meta property="og:image" content="https://drive.google.com/thumbnail?id=1lMKH8uIRg_9PfNW7S-MjyI7lGBXlAxZG&sz=w1000">
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: #1a1a1a; touch-action: none; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; 
        }

        .tilt-wrapper { 
            width: 90vw; max-width: 350px; aspect-ratio: 1 / 1.5; perspective: 1000px;
        }

        .card-flipper { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer; 
        }
        
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box;
            box-shadow: 0 1px 1px rgba(0,0,0,0.15), 0 2px 2px rgba(0,0,0,0.15), 0 4px 4px rgba(0,0,0,0.15), 0 8px 8px rgba(0,0,0,0.15), 0 30px 60px rgba(0,0,0,0.7);
        }

        .card-front { 
            background-image: url('https://drive.google.com/thumbnail?id=1lMKH8uIRg_9PfNW7S-MjyI7lGBXlAxZG&sz=w1000'); 
            background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; justify-content: center;
        }

        .flip-hint { 
            margin-bottom: 20px; padding: 7px 18px; background: rgba(220, 20, 60, 0.6); 
            color: rgba(255,255,255,0.95); font-size: 14px; border-radius: 20px; 
            backdrop-filter: blur(5px); pointer-events: none;
        }

        .card-back { 
            background-color: #f2f0eb; transform: rotateY(180deg); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 25px; box-sizing: border-box; text-align: center; 
        }
        
        .card-back .date-row { color: #666; font-size: 16px; letter-spacing: 1px; margin-bottom: 5px; font-weight: 500; }
        .card-back h2 { color: #3a1b1b; margin-top: 5px; margin-bottom: 12px; font-weight: 600; font-size: 22px; }
        .card-back p { color: #000000; margin: 6px 0; font-size: 16px; font-weight: 500; }
        
        .map-btn { 
            margin-top: 30px; padding: 12px 40px; background-color: #000000; color: #ffffff; 
            text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s;
        }

        #motion-btn { 
            margin-top: 25px; background: none; color: #555; border: 1px solid #444; 
            padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="tilt-wrapper" data-tilt data-tilt-gyroscope="true" data-tilt-max="12">
        <div class="card-flipper" id="myCard" onclick="handleCardClick(event)">
            <div class="card-front">
                <div class="flip-hint">點擊查看詳情</div>
            </div>
            <div class="card-back">
                <div class="date-row">4/9、4/10</div>
                <h2>誠摯邀請</h2>
                <p>Molteni&C 新品發表會</p>
                <p style="font-size: 14px; color: #666; margin-top: 10px;">探索義大利經典設計</p>
                <a href="https://maps.app.goo.gl/yS3E1P5SUpYpYJpS9" target="_blank" class="map-btn" onclick="event.stopPropagation();">📍 開啟地圖導航</a>
                <p style="font-size: 11px; color: #999; margin-top: 25px;">(點擊卡片再次翻轉)</p>
            </div>
        </div>
    </div>

    <button id="motion-btn" onclick="requestPermission()">開啟動態感應 (iOS)</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        let permissionRequested = false;
        let currentRotation = 0;

        function handleCardClick(event) {
            const card = document.getElementById('myCard');
            const rect = card.getBoundingClientRect();
            const clickX = event.clientX - rect.left; // 點擊位置距離卡片左邊的距離
            const midPoint = rect.width / 2;

            // 判斷點擊左邊還是右邊
            if (clickX < midPoint) {
                // 點左邊：往右轉 (角度減少)
                currentRotation -= 180;
            } else {
                // 點右邊：往左轉 (角度增加)
                currentRotation += 180;
            }

            card.style.transform = `rotateY(${currentRotation}deg)`;
            
            // iOS 動態感應權限處理
            if (!permissionRequested && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { 
                    if (res == 'granted') permissionRequested = true; 
                });
            }
        }
    </script>
</body>
</html>
