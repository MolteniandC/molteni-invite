<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molteni&C 新品發表會誠摯邀請您</title>
    <meta property="og:title" content="Molteni&C 新品發表會誠摯邀請您">
    <meta property="og:description" content="誠摯邀請您蒞臨，探索義大利頂級家具的設計美學。">
    <meta property="og:image" content="https://drive.google.com/thumbnail?id=1W2_5he7cACzIywjxumT-zcv6DLJHYBv2&sz=w1000">
    <meta property="og:type" content="website">
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1a1a1a; touch-action: none; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        .tilt-wrapper { width: 320px; height: 480px; perspective: 1000px; }
        .card-flipper { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .card-front { background-image: url('https://drive.google.com/thumbnail?id=1W2_5he7cACzIywjxumT-zcv6DLJHYBv2&sz=w1000'); background-size: cover; background-position: center; }
        .card-back { background-color: #2c2c2c; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; color: white; border: 1px solid #444; }
        .map-btn { margin-top: 25px; padding: 12px 35px; background-color: #f1c40f; color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .map-btn:hover { background-color: #fff; }
    </style>
</head>
<body>
    <div class="tilt-wrapper" data-tilt data-tilt-gyroscope="true" data-tilt-max="15">
        <div class="card-flipper" id="myCard" onclick="handleCardClick(event)">
            <div class="card-front"></div>
            <div class="card-back">
                <h2 style="color:#f1c40f">誠摯邀請</h2>
                <p>Molteni&C 新品發表會</p>
                <p>探索義大利經典設計</p>
                <a href="https://maps.app.goo.gl/n3nVtm5ZdGMi783TA" target="_blank" class="map-btn" onclick="event.stopPropagation();">📍 開啟地圖導航</a>
                <p style="font-size: 12px; color: #666; margin-top: 20px;">(再次點擊卡片可翻回正面)</p>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        let permissionRequested = false;
        function handleCardClick(event) {
            document.getElementById('myCard').classList.toggle('flipped');
            if (!permissionRequested && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res == 'granted') permissionRequested = true;
                });
            }
        }
    </script>
</body>
</html>
